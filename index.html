<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Tech Bank | Acceso</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="auth-body">
    <main class="login-container">
        <div class="glass-card">
            <header>
                <h1>Eco-Tech Bank</h1>
                <p>Industrial Avant-Garde System</p>
            </header>

            <div id="auth-box">
                <div id="login-form">
                    <input type="text" id="user-input" placeholder="Nombre del Usuario">
                    <input type="password" id="pin-input" placeholder="PIN de seguridad">
                    <button id="btn-ingresar" class="btn-primary">Ingresar al Sistema</button>
                    <p class="register-link">¿Nuevo operador? Registrarse</p>
                </div>
            </div>
        </div>
    </main>

    <script src="./js/login.js"></script>
</body>
</html>
