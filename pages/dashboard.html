<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Tech Bank | Avanzada Financiera</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-body">
    <div id="app" class="login-container">
        <div class="glass-card"> 
            <header>
                <h1>Eco-Tech Bank</h1>
                <p>Industrial Avant-Garde System</p>
            </header>

            <div id="dashboard">
                <div class="balance-card">
                    <h2>Saldo: <span id="saldo-valor">$0</span></h2>
                    <small>Cotización Dolar: $<span id="dolar-valor">0</span></small>
                </div>

                <div class="operaciones">
                    <input type="number" id="monto-input" placeholder="Monto de la operación">
                    <div class="grid-botones">
                        <button id="btn-deposito" class="btn-eco">Depositar</button>
                        <button id="btn-extraccion" class="btn-danger">Extraer</button>
                    </div>
                </div>

                <div class="movimientos">
                    <h4>Historial de Transacciones</h4>
                    <ul id="lista-transacciones"></ul>
                </div>

                <button id="btn-logout">Cerrar Sesión</button>
            </div>
        </div> 
    </div> 
</body>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
